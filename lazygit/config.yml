gui:
  theme:
    activeBorderColor:
      - blue
      - bold
    inactiveBorderColor:
      - white
    selectedLineBgColor:
      - default
  showIcons: true
  nerdFontsVersion: "3"
  mouseEvents: true

git:
  paging:
    colorArg: always
    pager: delta --paging=never --dark --line-numbers

refresher:
  refreshInterval: 10
  fetchInterval: 60

keybinding:
  universal:
    quit: q
    quit-alt1: <c-c>
    return: <esc>
    togglePanel: <tab>
    prevItem: <up>
    nextItem: <down>
    prevPage: ,
    nextPage: .
    gotoTop: <
    gotoBottom: ">"
    scrollLeft: H
    scrollRight: L
    prevBlock: <left>
    nextBlock: <right>
    nextMatch: "n"
    prevMatch: N
    startSearch: /
    optionMenu: x
    edit: e
    openFile: o
    scrollUpMain: <pgup>
    scrollDownMain: <pgdn>
    scrollUpMain-alt1: K
    scrollDownMain-alt1: J
    executeCustomCommand: ":"
    createRebaseOptionsMenu: m
    pushFiles: P
    pullFiles: p
    refresh: R
    createPatchOptionsMenu: <c-p>
    nextTab: "]"
    prevTab: "["
    nextScreenMode: +
    prevScreenMode: _
    undo: z
    redo: <c-z>
    filteringMenu: <c-s>
    diffingMenu: W
    diffingMenu-alt: <c-e>
    copyToClipboard: <c-o>
    submitEditorText: <enter>
    appendNewline: <a-enter>
    extrasMenu: "@"
    toggleWhitespaceInDiffView: <c-w>
    increaseContextInDiffView: "}"
    decreaseContextInDiffView: "{"
