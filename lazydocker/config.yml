gui:
  scrollHeight: 2
  scrollPastBottom: true
  mouseEvents: false
  skipStopWait: false
  theme:
    activeBorderColor:
      - blue
      - bold
    inactiveBorderColor:
      - white
    selectedLineBgColor:
      - default
    optionsTextColor:
      - blue
  returnImmediately: false
  wrapMainPanel: true
  legendIsBottom: true
  nerdFontsVersion: "3"

logs:
  timestamps: false
  since: "60m"
  tail: ""

commandTemplates:
  dockerCompose: docker compose

os:
  openCommand: "xdg-open {{filename}}"
  openLinkCommand: "xdg-open {{link}}"

stats:
  graphs:
    - caption: CPU (%)
      statPath: DerivedStats.CPUPercentage
      color: blue
    - caption: Memory (%)
      statPath: DerivedStats.MemoryPercentage
      color: green
